<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>找不同 - 选择版本</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .back-link {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            text-decoration: none;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 5px;
            z-index: 100;
            padding: 8px 16px;
            background: rgba(255,255,255,0.2);
            border-radius: 20px;
            transition: all 0.2s;
        }

        .back-link:hover {
            background: rgba(255,255,255,0.3);
        }

        .container {
            max-width: 800px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            color: white;
        }

        .header h1 {
            font-size: 42px;
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 18px;
            opacity: 0.9;
        }

        .version-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            padding: 20px;
        }

        .version-card {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-decoration: none;
            display: block;
        }

        .version-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .version-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }

        .version-title {
            font-size: 28px;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
        }

        .version-description {
            font-size: 16px;
            color: #666;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .version-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .tag {
            padding: 5px 12px;
            background: #f0f0f0;
            border-radius: 15px;
            font-size: 12px;
            color: #555;
        }

        .tag.recommended {
            background: #c8e6c9;
            color: #2e7d32;
        }

        .enter-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 15px 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 25px;
            font-size: 18px;
            font-weight: bold;
            transition: all 0.2s;
        }

        .version-card:hover .enter-btn {
            transform: scale(1.05);
        }

        .version-card.classic {
            border: 3px solid #e0e0e0;
        }

        .version-card.classic:hover {
            border-color: #667eea;
        }

        .version-card.v2 {
            border: 3px solid #e91e63;
        }

        .version-card.v2:hover {
            border-color: #c2185b;
        }

        /* 新版特性列表 */
        .features {
            text-align: left;
            margin: 20px 0;
            padding: 15px;
            background: #f8f8f8;
            border-radius: 10px;
        }

        .features li {
            margin: 8px 0;
            color: #555;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">← 返回首页</a>

    <div class="container">
        <div class="header">
            <h1>🔍 找不同</h1>
            <p>请选择游戏版本</p>
        </div>

        <div class="version-grid">
            <!-- V2 精美版 -->
            <a href="v2.html" class="version-card v2">
                <div class="version-icon">✨</div>
                <h2 class="version-title">精美版 V2</h2>
                <p class="version-description">
                    全新UI设计，多主题关卡，更多趣味玩法
                </p>
                <ul class="features">
                    <li>🎨 多主题：电影、水果、自然、动物、美食、运动</li>
                    <li>📊 关卡系统：每主题10关，难度递增</li>
                    <li>🎉 通关庆祝动画</li>
                    <li>💡 提示、加时、放大功能</li>
                </ul>
                <div class="version-tags">
                    <span class="tag recommended">推荐</span>
                    <span class="tag">最新版本</span>
                    <span class="tag">精美UI</span>
                </div>
                <div class="enter-btn">开始游戏 →</div>
            </a>

            <!-- 经典版 -->
            <a href="classic.html" class="version-card classic">
                <div class="version-icon">🏮</div>
                <h2 class="version-title">经典版</h2>
                <p class="version-description">
                    还原最初玩法，简洁界面，怀旧体验
                </p>
                <ul class="features">
                    <li>🎯 经典找不同玩法</li>
                    <li>📱 简洁界面设计</li>
                    <li>⚡ 轻量快速加载</li>
                    <li>🔄 随机图片生成</li>
                </ul>
                <div class="version-tags">
                    <span class="tag">经典怀旧</span>
                    <span class="tag">简洁风格</span>
                    <span class="tag">原汁原味</span>
                </div>
                <div class="enter-btn">开始游戏 →</div>
            </a>
        </div>
    </div>
</body>
</html>
