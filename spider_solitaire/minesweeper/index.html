<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>扫雷游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        /* ====== 返回首页按钮 ====== */
        .back-link {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            text-decoration: none;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 5px;
            z-index: 100;
            padding: 8px 16px;
            background: rgba(255,255,255,0.2);
            border-radius: 20px;
            transition: all 0.2s;
        }

        .back-link:hover {
            background: rgba(255,255,255,0.3);
            opacity: 0.9;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            color: white;
        }

        .header h1 {
            font-size: 36px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .level-info {
            font-size: 18px;
            opacity: 0.9;
        }

        .game-container {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding: 10px 15px;
            background: #f5f5f5;
            border-radius: 10px;
        }

        .game-stat {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .game-stat-label {
            font-size: 14px;
            color: #666;
        }

        .game-stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
            min-width: 60px;
            text-align: center;
        }

        .face-btn {
            width: 50px;
            height: 50px;
            font-size: 30px;
            border: none;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(102,126,234,0.4);
        }

        .face-btn:hover {
            transform: scale(1.1);
        }

        .face-btn:active {
            transform: scale(0.95);
        }

        .mine-grid {
            display: grid;
            gap: 2px;
            background: #333;
            padding: 3px;
            border-radius: 8px;
            border: 3px solid #333;
        }

        .cell {
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            user-select: none;
            transition: all 0.1s;
            border-radius: 4px;
        }

        .cell.hidden {
            background: linear-gradient(135deg, #c0c0c0 0%, #a0a0a0 100%);
            border: 2px outset #fff;
        }

        .cell.hidden:active {
            border: 2px inset #999;
        }

        .cell.flagged {
            background: #c0c0c0;
            color: #d32f2f;
        }

        .cell.revealed {
            background: #e8e8e8;
            border: 1px solid #ccc;
        }

        .cell.mine {
            background: #d32f2f;
            color: white;
        }

        .cell.mine-exploaded {
            background: #f44336;
        }

        /* 数字颜色 */
        .cell[data-num="1"] { color: #2196f3; }
        .cell[data-num="2"] { color: #4caf50; }
        .cell[data-num="3"] { color: #f44336; }
        .cell[data-num="4"] { color: #9c27b0; }
        .cell[data-num="5"] { color: #ff9800; }
        .cell[data-num="6"] { color: #00bcd4; }
        .cell[data-num="7"] { color: #333; }
        .cell[data-num="8"] { color: #666; }

        .controls {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .level-selector {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .level-btn {
            padding: 10px 20px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
            font-size: 14px;
        }

        .level-btn:hover, .level-btn.active {
            background: #667eea;
            color: white;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            font-size: 14px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102,126,234,0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102,126,234,0.5);
        }

        .btn-secondary {
            background: #f5f5f5;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .instructions {
            margin-top: 15px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 10px;
            font-size: 13px;
            color: #666;
            line-height: 1.6;
        }

        .instructions h3 {
            color: #667eea;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 40px 60px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            text-align: center;
            z-index: 1000;
            display: none;
        }

        .message.show {
            display: block;
            animation: popIn 0.3s ease;
        }

        @keyframes popIn {
            0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        .message h2 {
            font-size: 32px;
            margin-bottom: 15px;
        }

        .message.win h2 {
            color: #4caf50;
        }

        .message.lose h2 {
            color: #f44336;
        }

        .message p {
            font-size: 18px;
            color: #666;
            margin-bottom: 20px;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 999;
            display: none;
        }

        .overlay.show {
            display: block;
        }

        @media (max-width: 500px) {
            .cell {
                width: 25px;
                height: 25px;
                font-size: 12px;
            }

            .header h1 {
                font-size: 28px;
            }

            .game-stat-value {
                font-size: 18px;
                min-width: 40px;
            }

            .face-btn {
                width: 40px;
                height: 40px;
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <a href="../" class="back-link">← 返回游戏首页</a>

    <div class="header">
        <h1>🚩 扫雷挑战</h1>
        <div class="level-info">当前难度: <span id="currentLevel">简单</span></div>
    </div>

    <div class="level-selector">
        <button class="level-btn active" data-level="easy">简单 9×9</button>
        <button class="level-btn" data-level="medium">中等 16×16</button>
        <button class="level-btn" data-level="hard">困难 16×30</button>
    </div>

    <div class="game-container">
        <div class="game-header">
            <div class="game-stat">
                <span class="game-stat-label">💣 剩余雷</span>
                <span class="game-stat-value" id="minesLeft">10</span>
            </div>
            <button class="face-btn" id="faceBtn" onclick="startNewGame()">😊</button>
            <div class="game-stat">
                <span class="game-stat-label">⏱️ 时间</span>
                <span class="game-stat-value" id="timer">000</span>
            </div>
        </div>

        <div class="mine-grid" id="grid"></div>

        <div class="controls">
            <div class="action-buttons">
                <button class="btn btn-secondary" id="resetBtn" onclick="startNewGame()">🔄 重新开始</button>
            </div>
        </div>

        <div class="instructions">
            <h3>游戏规则</h3>
            • 左键点击方块揭开数字<br>
            • 右键点击插旗标记地雷<br>
            • 数字表示周围8个格子中的地雷数量<br>
            • 避开所有地雷即可获胜
        </div>
    </div>

    <div class="overlay" id="overlay"></div>
    <div class="message" id="message">
        <h2>🎉 恭喜获胜!</h2>
        <p>用时: <span id="finalTime">000</span> 秒</p>
        <button class="btn btn-primary" onclick="startNewGame()">再玩一局</button>
    </div>

    <script>
        // 游戏配置
        const levelConfig = {
            easy: { rows: 9, cols: 9, mines: 10 },
            medium: { rows: 16, cols: 16, mines: 40 },
            hard: { rows: 16, cols: 30, mines: 99 }
        };

        // 游戏状态
        let currentLevel = 'easy';
        let board = [];
        let revealed = [];
        let flagged = [];
        let gameOver = false;
        let gameWon = false;
        let firstClick = true;
        let timer = null;
        let seconds = 0;
        let minesLeft = 0;

        // 初始化
        function init() {
            bindEvents();
            startNewGame();
        }

        // 绑定事件
        function bindEvents() {
            // 难度选择
            document.querySelectorAll('.level-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentLevel = btn.dataset.level;
                    document.getElementById('currentLevel').textContent = btn.textContent;
                    startNewGame();
                });
            });

            // 表情按钮点击
            document.getElementById('faceBtn').addEventListener('mousedown', () => {
                if (!gameOver) {
                    document.getElementById('faceBtn').textContent = '😮';
                }
            });

            document.getElementById('faceBtn').addEventListener('mouseup', () => {
                if (!gameOver && !gameWon) {
                    document.getElementById('faceBtn').textContent = '😊';
                }
            });

            // 阻止右键菜单
            document.addEventListener('contextmenu', (e) => {
                e.preventDefault();
            });
        }

        // 开始新游戏
        function startNewGame() {
            const config = levelConfig[currentLevel];
            const { rows, cols, mines } = config;

            // 重置状态
            board = [];
            revealed = Array(rows).fill(null).map(() => Array(cols).fill(false));
            flagged = Array(rows).fill(null).map(() => Array(cols).fill(false));
            gameOver = false;
            gameWon = false;
            firstClick = true;
            seconds = 0;
            minesLeft = mines;

            // 重置计时器
            if (timer) clearInterval(timer);
            timer = setInterval(updateTimer, 1000);

            // 创建地雷布局（首点击不炸）
            createBoard(rows, cols, mines);

            // 更新界面
            document.getElementById('faceBtn').textContent = '😊';
            document.getElementById('minesLeft').textContent = minesLeft;
            document.getElementById('timer').textContent = '000';

            hideMessage();
            renderGrid();
        }

        // 创建棋盘
        function createBoard(rows, cols, mines) {
            board = Array(rows).fill(null).map(() => Array(cols).fill(0));
        }

        // 放置地雷（确保第一次点击不是雷）
        function placeMines(rows, cols, mines, excludeRow, excludeCol) {
            let placed = 0;
            const excludeSet = new Set();

            // 排除点击位置周围9个格子
            for (let r = excludeRow - 1; r <= excludeRow + 1; r++) {
                for (let c = excludeCol - 1; c <= excludeCol + 1; c++) {
                    if (r >= 0 && r < rows && c >= 0 && c < cols) {
                        excludeSet.add(`${r},${c}`);
                    }
                }
            }

            while (placed < mines) {
                const row = Math.floor(Math.random() * rows);
                const col = Math.floor(Math.random() * cols);
                const key = `${row},${col}`;

                if (board[row][col] !== -1 && !excludeSet.has(key)) {
                    board[row][col] = -1;
                    placed++;
                }
            }

            // 计算数字
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (board[r][c] !== -1) {
                        board[r][c] = countMines(r, c);
                    }
                }
            }
        }

        // 计算周围地雷数
        function countMines(row, col) {
            let count = 0;
            for (let r = row - 1; r <= row + 1; r++) {
                for (let c = col - 1; c <= col + 1; c++) {
                    if (r >= 0 && r < board.length && c >= 0 && c < board[0].length) {
                        if (board[r][c] === -1) count++;
                    }
                }
            }
            return count;
        }

        // 渲染网格
        function renderGrid() {
            const grid = document.getElementById('grid');
            const config = levelConfig[currentLevel];

            grid.style.gridTemplateColumns = `repeat(${config.cols}, 30px)`;
            grid.style.gridTemplateRows = `repeat(${config.rows}, 30px)`;
            grid.innerHTML = '';

            for (let r = 0; r < config.rows; r++) {
                for (let c = 0; c < config.cols; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell hidden';
                    cell.dataset.row = r;
                    cell.dataset.col = c;

                    cell.addEventListener('click', () => handleClick(r, c));
                    cell.addEventListener('contextmenu', (e) => handleRightClick(e, r, c));
                    cell.addEventListener('mousedown', () => {
                        if (!gameOver && !gameWon) {
                            document.getElementById('faceBtn').textContent = '😮';
                        }
                    });
                    cell.addEventListener('mouseup', () => {
                        if (!gameOver && !gameWon) {
                            document.getElementById('faceBtn').textContent = '😊';
                        }
                    });

                    grid.appendChild(cell);
                }
            }
        }

        // 处理左键点击
        function handleClick(row, col) {
            if (gameOver || gameWon) return;
            if (flagged[row][col]) return;

            // 第一次点击，放置地雷
            if (firstClick) {
                firstClick = false;
                const config = levelConfig[currentLevel];
                placeMines(config.rows, config.cols, config.mines, row, col);
            }

            // 点击到地雷
            if (board[row][col] === -1) {
                revealMine(row, col);
                return;
            }

            // 揭开数字
            revealCell(row, col);

            // 检查是否获胜
            checkWin();
        }

        // 递归揭开格子
        function revealCell(row, col) {
            const config = levelConfig[currentLevel];
            if (row < 0 || row >= config.rows || col < 0 || col >= config.cols) return;
            if (revealed[row][col] || flagged[row][col]) return;

            revealed[row][col] = true;

            const cell = getCell(row, col);
            cell.classList.remove('hidden');
            cell.classList.add('revealed');

            if (board[row][col] > 0) {
                cell.textContent = board[row][col];
                cell.dataset.num = board[row][col];
            } else {
                // 空格子，递归揭开周围
                for (let r = row - 1; r <= row + 1; r++) {
                    for (let c = col - 1; c <= col + 1; c++) {
                        if (r !== row || c !== col) {
                            revealCell(r, c);
                        }
                    }
                }
            }
        }

        // 处理右键点击
        function handleRightClick(e, row, col) {
            e.preventDefault();
            if (gameOver || gameWon) return;
            if (revealed[row][col]) return;

            const cell = getCell(row, col);

            if (flagged[row][col]) {
                // 取消插旗
                flagged[row][col] = false;
                cell.classList.remove('flagged');
                cell.textContent = '';
                minesLeft++;
            } else {
                // 插旗
                flagged[row][col] = true;
                cell.classList.add('flagged');
                cell.textContent = '🚩';
                minesLeft--;
            }

            document.getElementById('minesLeft').textContent = minesLeft;
        }

        // 揭开地雷（游戏结束）
        function revealMine(hitRow, hitCol) {
            gameOver = true;
            clearInterval(timer);
            document.getElementById('faceBtn').textContent = '😵';

            const config = levelConfig[currentLevel];

            // 显示所有地雷
            for (let r = 0; r < config.rows; r++) {
                for (let c = 0; c < config.cols; c++) {
                    const cell = getCell(r, c);

                    if (board[r][c] === -1) {
                        cell.classList.remove('hidden');
                        cell.classList.add('revealed', 'mine');

                        if (r === hitRow && c === hitCol) {
                            cell.classList.add('mine-exploaded');
                        } else {
                            cell.textContent = '💣';
                        }
                    } else if (flagged[r][c] && board[r][c] !== -1) {
                        // 插错旗
                        cell.style.background = '#ffcdd2';
                        cell.textContent = '❌';
                    }
                }
            }

            showLoseMessage();
        }

        // 检查是否获胜
        function checkWin() {
            const config = levelConfig[currentLevel];
            let revealedCount = 0;

            for (let r = 0; r < config.rows; r++) {
                for (let c = 0; c < config.cols; c++) {
                    if (revealed[r][c]) revealedCount++;
                }
            }

            const totalCells = config.rows * config.cols;
            const nonMineCells = totalCells - config.mines;

            if (revealedCount === nonMineCells) {
                gameWon = true;
                clearInterval(timer);
                document.getElementById('faceBtn').textContent = '🥳';

                // 标记所有地雷
                const config = levelConfig[currentLevel];
                for (let r = 0; r < config.rows; r++) {
                    for (let c = 0; c < config.cols; c++) {
                        if (board[r][c] === -1 && !flagged[r][c]) {
                            const cell = getCell(r, c);
                            cell.classList.add('flagged');
                            cell.textContent = '🚩';
                        }
                    }
                }

                document.getElementById('minesLeft').textContent = '0';
                showWinMessage();
            }
        }

        // 获取单元格元素
        function getCell(row, col) {
            const grid = document.getElementById('grid');
            const index = row * levelConfig[currentLevel].cols + col;
            return grid.children[index];
        }

        // 更新计时器
        function updateTimer() {
            seconds++;
            document.getElementById('timer').textContent = seconds.toString().padStart(3, '0');
        }

        // 显示获胜消息
        function showWinMessage() {
            document.getElementById('finalTime').textContent = seconds.toString().padStart(3, '0');
            document.getElementById('message').className = 'message show win';
            document.getElementById('overlay').classList.add('show');
        }

        // 显示失败消息
        function showLoseMessage() {
            document.getElementById('message').className = 'message show lose';
            document.getElementById('message').innerHTML = `
                <h2>💥 游戏结束</h2>
                <p>你踩到地雷了！</p>
                <button class="btn btn-primary" onclick="startNewGame()">再试一次</button>
            `;
            document.getElementById('overlay').classList.add('show');
        }

        // 隐藏消息
        function hideMessage() {
            document.getElementById('overlay').classList.remove('show');
            document.getElementById('message').classList.remove('show');
            document.getElementById('message').innerHTML = `
                <h2>🎉 恭喜获胜!</h2>
                <p>用时: <span id="finalTime">000</span> 秒</p>
                <button class="btn btn-primary" onclick="startNewGame()">再玩一局</button>
            `;
        }

        // 启动
        init();
    </script>
</body>
</html>
